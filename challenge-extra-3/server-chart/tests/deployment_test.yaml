suite: Deployment
templates:
  - deployment.yaml

tests:
  # ---------------------------------------------------------------------------
  # Metadata
  # ---------------------------------------------------------------------------
  - it: sets the fullname as the Deployment name
    release:
      name: myrelease
    chart:
      appVersion: "1.0.0"
    asserts:
      - equal:
          path: metadata.name
          value: myrelease-server-chart   # Release.Name + "-" + Chart.Name

  - it: uses fullnameOverride when provided
    set:
      fullnameOverride: custom-name
    asserts:
      - equal:
          path: metadata.name
          value: custom-name

  - it: includes helm.sh/chart label
    release:
      name: myrelease
    asserts:
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: ^server-chart-

  - it: includes managed-by label
    release:
      name: myrelease
      service: Helm
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # ---------------------------------------------------------------------------
  # Replicas
  # ---------------------------------------------------------------------------
  - it: sets replicaCount from values (default 1)
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: overrides replicaCount
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # ---------------------------------------------------------------------------
  # Selector labels
  # ---------------------------------------------------------------------------
  - it: sets matchLabels with selectorLabels
    release:
      name: myrelease
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: server-chart
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: myrelease

  - it: pod template labels match selector labels
    release:
      name: myrelease
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: server-chart
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: myrelease

  # ---------------------------------------------------------------------------
  # Container — image
  # ---------------------------------------------------------------------------
  - it: uses the default image repository and tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "localhost/my-http-server:latest"

  - it: overrides image repository and tag
    set:
      image.repository: myregistry/myapp
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "myregistry/myapp:1.2.3"

  - it: sets imagePullPolicy from values (default Never)
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Never

  - it: overrides imagePullPolicy to IfNotPresent
    set:
      image.pullPolicy: IfNotPresent
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  # ---------------------------------------------------------------------------
  # Container — ports
  # ---------------------------------------------------------------------------
  - it: exposes containerPort 8080 named http
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].ports[0].protocol
          value: TCP

  # ---------------------------------------------------------------------------
  # Resources (optional block)
  # ---------------------------------------------------------------------------
  - it: does not render resources block when not set
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].resources

  - it: renders resources block when set
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi
